name: Deploy HookaApp to DigitalOcean via Docker

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lower case repository name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-backend:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-frontend:latest

  deploy:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to Droplet
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: "/var/www/hookaapp"

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
          DOMAIN: ${{ secrets.DOMAIN }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,POSTGRES_PORT,DATABASE_URL,JWT_SECRET,GH_TOKEN,FRONTEND_URL,ACME_EMAIL,DOMAIN
          script: |
            # 1. Crear directorio si no existe y navegar
            mkdir -p /var/www/hookaapp
            cd /var/www/hookaapp
            # 2. Iniciar sesiĂłn en GitHub Container Registry para descargar imĂˇgenes privadas
            echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # 3. Calcular nombres de imagen en minĂşsculas
            BACKEND_IMAGE=$(echo "ghcr.io/${{ env.IMAGE_NAME }}-backend:latest" | tr '[:upper:]' '[:lower:]')
            FRONTEND_IMAGE=$(echo "ghcr.io/${{ env.IMAGE_NAME }}-frontend:latest" | tr '[:upper:]' '[:lower:]')

            # 4. Escribir .env sin indentaciĂłn (heredoc sin sangrĂ­a para evitar corrupciĂłn)
            cat > .env <<'ENVEOF'
POSTGRES_USER=$POSTGRES_USER
POSTGRES_PASSWORD=$POSTGRES_PASSWORD
POSTGRES_DB=$POSTGRES_DB
POSTGRES_PORT=$POSTGRES_PORT
DATABASE_URL=$DATABASE_URL
JWT_SECRET=$JWT_SECRET
BACKEND_IMAGE=$BACKEND_IMAGE
FRONTEND_IMAGE=$FRONTEND_IMAGE
FRONTEND_URL=$FRONTEND_URL
ACME_EMAIL=$ACME_EMAIL
DOMAIN=$DOMAIN
ENVEOF
            # Expandir las variables del shell dentro del .env ya escrito
            envsubst < .env > .env.tmp && mv .env.tmp .env

            # 5. Bajar contenedores existentes
            docker compose down

            # 6. Descargar nuevas versiones e iniciar
            docker compose pull
            docker compose up -d

            # 7. Esperar a que el backend arranque antes de migrar
            sleep 15

            # 8. Ejecutar migraciones de Prisma
            docker compose exec -T backend npx prisma migrate deploy

            # 9. Asegurar que existe un administrador
            docker compose exec -T backend npx ts-node prisma/ensure-admin.ts

            # 10. Limpiar imĂˇgenes antiguas
            docker image prune -a -f
