name: Deploy HookaHub to DigitalOcean via Docker

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lower case repository name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lower case repository name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Copy files to Droplet
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: "/var/www/hookaapp"

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
          DOMAIN: ${{ secrets.DOMAIN }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,POSTGRES_PORT,DATABASE_URL,JWT_SECRET,JWT_REFRESH_SECRET,GH_TOKEN,FRONTEND_URL,ACME_EMAIL,DOMAIN,NODE_ENV
          script: |
            # 1. Crear directorio si no existe y navegar
            mkdir -p /var/www/hookaapp
            cd /var/www/hookaapp

            # 2. Login en GitHub Container Registry
            echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # 3. Calcular nombres de imagen en minúsculas
            BACKEND_IMAGE=$(echo "ghcr.io/${{ env.IMAGE_NAME }}-backend:latest" | tr '[:upper:]' '[:lower:]')
            FRONTEND_IMAGE=$(echo "ghcr.io/${{ env.IMAGE_NAME }}-frontend:latest" | tr '[:upper:]' '[:lower:]')

            # 4. Escribir .env (printf en lugar de heredoc para compatibilidad YAML)
            printf "POSTGRES_USER=%s\n"   "$POSTGRES_USER"   > .env
            printf "POSTGRES_PASSWORD=%s\n" "$POSTGRES_PASSWORD" >> .env
            printf "POSTGRES_DB=%s\n"     "$POSTGRES_DB"     >> .env
            printf "POSTGRES_PORT=%s\n"   "$POSTGRES_PORT"   >> .env
            printf "DATABASE_URL=%s\n"    "$DATABASE_URL"    >> .env
            printf "JWT_SECRET=%s\n"      "$JWT_SECRET"      >> .env
            printf "JWT_REFRESH_SECRET=%s\n" "$JWT_REFRESH_SECRET" >> .env
            printf "NODE_ENV=%s\n" "$NODE_ENV" >> .env
            printf "BACKEND_IMAGE=%s\n"   "$BACKEND_IMAGE"   >> .env
            printf "FRONTEND_IMAGE=%s\n"  "$FRONTEND_IMAGE"  >> .env
            printf "FRONTEND_URL=%s\n"    "$FRONTEND_URL"    >> .env
            printf "ACME_EMAIL=%s\n"      "$ACME_EMAIL"      >> .env
            printf "DOMAIN=%s\n"          "$DOMAIN"          >> .env

            # 5. Bajar contenedores existentes
            docker compose down

            # 6. Descargar nuevas versiones e iniciar
            docker compose pull
            docker compose up -d

            # 7. Esperar a que el backend arranque antes de migrar
            sleep 10

            # 8. Ejecutar migraciones de Prisma
            docker compose exec -T backend npx prisma migrate deploy

            # 9. Limpiar imágenes antiguas
            docker image prune -a -f
