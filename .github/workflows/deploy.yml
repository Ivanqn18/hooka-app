name: Deploy HookaApp to DigitalOcean via Docker

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lower case repository name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-backend:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-frontend:latest

  deploy:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to Droplet
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: "/var/www/hookaapp"

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,POSTGRES_PORT,DATABASE_URL,JWT_SECRET,GH_TOKEN,FRONTEND_URL
          script: |
            # 1. Crear directorio si no existe y navegar
            mkdir -p /var/www/hookaapp
            cd /var/www/hookaapp
            # 2. Iniciar sesiĂłn en GitHub Container Registry para descargar imĂˇgenes privadas
            echo $GH_TOKEN | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 3. Descargar las nuevas imĂˇgenes
            export BACKEND_IMAGE=ghcr.io/${{ env.IMAGE_NAME }}-backend:latest
            export FRONTEND_IMAGE=ghcr.io/${{ env.IMAGE_NAME }}-frontend:latest
            
            # Asegurar que el formato sea todo minĂşsculas
            export BACKEND_IMAGE=$(echo $BACKEND_IMAGE | tr '[:upper:]' '[:lower:]')
            export FRONTEND_IMAGE=$(echo $FRONTEND_IMAGE | tr '[:upper:]' '[:lower:]')
            
            # Escribir las variables en el .env del servidor (generado automĂˇticamente)
            cat <<EOF > .env
            POSTGRES_USER=$POSTGRES_USER
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            POSTGRES_DB=$POSTGRES_DB
            POSTGRES_PORT=$POSTGRES_PORT
            DATABASE_URL=$DATABASE_URL
            JWT_SECRET=$JWT_SECRET
            BACKEND_IMAGE=$BACKEND_IMAGE
            FRONTEND_IMAGE=$FRONTEND_IMAGE
            FRONTEND_URL=$FRONTEND_URL
            EOF
            
            # Bajar contenedores existentes
            docker compose down
            
            # Descargar nuevas versiones e iniciar
            docker compose pull
            docker compose up -d
            
            # Ejecutar migraciones de Prisma en la base de datos de producciĂłn
            docker compose exec -T backend npx prisma migrate deploy
            
            # Asegurar que existe un administrador en la base de datos
            docker compose exec -T backend npx ts-node prisma/ensure-admin.ts
            
            # Limpiar imĂˇgenes antiguas para no llenar el disco del servidor
            docker image prune -a -f
